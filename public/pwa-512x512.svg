<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="targetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0066ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0" />
    </radialGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>
  
  <!-- High Visibility Target -->
  <g transform="translate(256, 256)">
    <!-- Outer Rings - Electric Blue -->
    <circle r="200" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.2"/>
    <circle r="150" fill="none" stroke="#00d4ff" stroke-width="6" opacity="0.4"/>
    <circle r="100" fill="none" stroke="#00d4ff" stroke-width="10" opacity="0.6"/>
    
    <!-- Crosshair - Bold Electric Blue -->
    <path d="M-236 0 L236 0 M0 -236 L0 236" stroke="#00d4ff" stroke-width="12" opacity="0.8" stroke-linecap="round" filter="url(#neon)"/>
    
    <!-- The "Hit" - Cyan/Electric Blue Glow -->
    <g transform="translate(100, -100)">
      <!-- Outer Glow -->
      <circle r="80" fill="url(#targetGlow)" opacity="0.8"/>
      <!-- Core -->
      <circle r="35" fill="#00ffff" filter="url(#neon)"/>
      <circle r="15" fill="white" filter="url(#neon)"/>
      
      <!-- Impact Lines -->
      <path d="M-30 -30 L-16 -16 M30 30 L16 16 M-30 30 L-16 16 M30 -30 L16 -16" stroke="white" stroke-width="10" stroke-linecap="round" opacity="1"/>
    </g>
    
    <!-- Center Point -->
    <circle r="15" fill="white" filter="url(#neon)"/>
  </g>
</svg>
