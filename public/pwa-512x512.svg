<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>
  
  <!-- Stylized Football / Analysis Icon -->
  <g transform="translate(256, 256)">
    <!-- Outer Ring -->
    <circle r="180" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="20 10" opacity="0.3"/>
    <circle r="160" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    
    <!-- Hexagon Pattern (Football feel) -->
    <g fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.8">
      <path d="M0 -100 L86.6 -50 L86.6 50 L0 100 L-86.6 50 L-86.6 -50 Z"/>
      <path d="M0 -100 L0 -180" stroke-width="2" opacity="0.4"/>
      <path d="M86.6 -50 L155.8 -90" stroke-width="2" opacity="0.4"/>
      <path d="M86.6 50 L155.8 90" stroke-width="2" opacity="0.4"/>
      <path d="M0 100 L0 180" stroke-width="2" opacity="0.4"/>
      <path d="M-86.6 50 L-155.8 90" stroke-width="2" opacity="0.4"/>
      <path d="M-86.6 -50 L-155.8 -90" stroke-width="2" opacity="0.4"/>
    </g>
    
    <!-- Central Analysis Node -->
    <circle r="40" fill="#3b82f6" filter="url(#glow)"/>
    <path d="M-20 0 L20 0 M0 -20 L0 20" stroke="white" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Data Accents -->
    <circle cx="120" cy="-70" r="8" fill="#3b82f6"/>
    <circle cx="-120" cy="70" r="8" fill="#3b82f6"/>
    <circle cx="0" cy="140" r="6" fill="#3b82f6" opacity="0.6"/>
  </g>
</svg>
