<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121212;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>
  
  <!-- Minimalist Analysis/Football Icon -->
  <g transform="translate(256, 256)">
    <!-- The "A" / Pitch Perspective -->
    <path d="M-120 120 L0 -120 L120 120" fill="none" stroke="url(#strokeGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- The "Goal/Data" Crossbar -->
    <path d="M-60 20 L60 20" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.15"/>
    
    <!-- The "Ball" / Analysis Point -->
    <circle cx="0" cy="-40" r="35" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="0" cy="-40" r="12" fill="white" opacity="0.8"/>
    
    <!-- Subtle Grid Accents -->
    <path d="M-160 160 L160 160" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
    <path d="M-140 140 L140 140" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1"/>
  </g>
</svg>
