<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytic Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/pwa-512x512.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
      // Prevent libraries from trying to overwrite window.fetch in environments where it's read-only
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Attempt to overwrite window.fetch blocked.'); },
              configurable: false
            });
          } catch (e) {
            // If it's already a getter, we might not be able to redefine it, but that's fine
          }
        }
      })();

      // Global error handler to catch boot errors
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const statusEl = document.getElementById('boot-status');
        if (statusEl) {
          statusEl.textContent = 'Errore: ' + msg;
          statusEl.style.color = '#ef4444';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: white; font-family: system-ui, -apple-system, sans-serif;">
        <div style="text-align: center; display: flex; flex-direction: column; align-items: center;">
          <div style="width: 80px; height: 80px; margin-bottom: 32px; filter: drop-shadow(0 0 20px rgba(37, 99, 235, 0.2));">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="load-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#2563eb" />
                  <stop offset="100%" stopColor="#3b82f6" />
                </linearGradient>
                <filter id="glow-load" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="2" result="blur" />
                  <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
              </defs>
              <path d="M50 5 L89 27.5 V72.5 L50 95 L11 72.5 V27.5 L50 5Z" fill="url(#load-gradient)" filter="url(#glow-load)" />
              <path d="M50 20 L76 35 V65 L50 80 L24 65 V35 L50 20Z" fill="white" fillOpacity="0.15" />
              <path d="M50 30 L67 40 V60 L50 70 L33 60 V40 L50 30Z" fill="white" fillOpacity="0.9" />
              <circle cx="50" cy="50" r="5" fill="#2563eb">
                <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" />
              </circle>
            </svg>
          </div>
          <h1 style="font-weight: 900; font-size: 2.25rem; letter-spacing: -0.05em; margin: 0; text-transform: uppercase; display: flex; align-items: baseline;">
            ANALYTIC <span style="color: #3b82f6; margin-left: 8px;">HUB</span>
          </h1>
          <div style="width: 48px; height: 3px; background: linear-gradient(to right, #2563eb, #3b82f6); margin: 16px auto; border-radius: 2px;"></div>
          <p id="boot-status" style="font-size: 0.7rem; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 0.2em; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">Inizializzazione Analytic Hub...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
