<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytic Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/pwa-512x512.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
      // Prevent libraries from trying to overwrite window.fetch in environments where it's read-only
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Attempt to overwrite window.fetch blocked.'); },
              configurable: false
            });
          } catch (e) {
            // If it's already a getter, we might not be able to redefine it, but that's fine
          }
        }
      })();

      // Global error handler to catch boot errors
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const statusEl = document.getElementById('boot-status');
        if (statusEl) {
          statusEl.textContent = 'Errore: ' + msg;
          statusEl.style.color = '#ef4444';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #070708; color: white; font-family: system-ui, -apple-system, sans-serif;">
        <div style="text-align: center;">
          <div style="width: 64px; height: 64px; margin: 0 auto 24px; position: relative;">
            <div style="position: absolute; inset: 0; border: 2px solid rgba(59, 130, 246, 0.1); border-radius: 50%;"></div>
            <div style="position: absolute; inset: 0; border: 2px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <svg viewBox="0 0 100 100" style="position: absolute; inset: 0; margin: auto; width: 32px; height: 32px; opacity: 0.9;">
              {/* Slanted bars matching the main logo */}
              <rect x="29" y="44" width="8" height="32" rx="4" transform="rotate(-12 29 44)" fill="#3b82f6" fillOpacity="0.85" />
              <rect x="44" y="32" width="8" height="44" rx="4" transform="rotate(-12 44 32)" fill="#2563eb" />
              <rect x="59" y="24" width="8" height="52" rx="4" transform="rotate(-12 59 24)" fill="#10b981" />
              {/* Curve path */}
              <path d="M 18 80 C 26 58, 54 26, 76 22" stroke="#60a5fa" strokeWidth="6" strokeLinecap="round" fill="none" />
              <circle cx="76" cy="22" r="7" fill="#ffffff" />
              <circle cx="76" cy="22" r="3" fill="#10b981" />
            </svg>
          </div>
          <h1 style="font-weight: 900; font-size: 1.5rem; letter-spacing: -0.05em; margin: 0; text-transform: uppercase;">
            ANALYTIC <span style="color: #3b82f6;">HUB</span>
          </h1>
          <p style="font-size: 0.6rem; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 0.3em; margin-top: 12px; animation: pulse 2s infinite;">Avvio in corso...</p>
        </div>
      </div>
      <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
